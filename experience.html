<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Experience</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .experience-container {
            max-width: 500px;
            width: 100%;
        }

        h2 {
            color: #2d3436;
            border-left: 5px solid #0984e3;
            padding-left: 15px;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card {
            background: #ffffff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid #eee;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .card h3 {
            margin: 0 0 10px 0;
            color: #0984e3;
            font-size: 1.4rem;
        }

        .card p {
            margin: 0;
            color: #636e72;
            line-height: 1.6;
        }

        .tech-stack {
            margin-top: 15px;
            display: flex;
            gap: 8px;
        }

        .badge {
            background: #dfe6e9;
            color: #2d3436;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="experience-container">
    <h2>Experiences</h2>

    <div class="card">
        <h3>Web Developer Intern</h3>
        <p>Bertanggung jawab dalam membangun dan mengoptimalkan antarmuka website agar responsif, interaktif, dan ramah pengguna.</p>
        
        <div class="tech-stack">
            <span class="badge">HTML5</span>
            <span class="badge">CSS3</span>
            <span class="badge">JavaScript</span>
        </div>
    </div>
</div>

</body>
</html>
